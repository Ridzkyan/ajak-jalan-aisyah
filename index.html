<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aisyah Cantik</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="floaters" aria-hidden="true">
      <span>&hearts;</span>
      <span>&#10048;</span>
      <span>&hearts;</span>
      <span>&#10049;</span>
      <span>&hearts;</span>
      <span>&#10048;</span>
    </div>
    <div class="page-stickers" aria-hidden="true">
      <img
        class="page-sticker"
        src="https://media.giphy.com/media/vFKqnCdLPNOKc/giphy.gif"
        alt=""
      />
      <img
        class="page-sticker"
        src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif"
        alt=""
      />
      <img
        class="page-sticker"
        src="https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif"
        alt=""
      />
      <img
        class="page-sticker"
        src="https://media.giphy.com/media/11s7Ke7jcNxCHS/giphy.gif"
        alt=""
      />
      <img
        class="page-sticker"
        src="https://media.giphy.com/media/13CoXDiaCcCoyk/giphy.gif"
        alt=""
      />
      <img
        class="page-sticker"
        src="https://media.giphy.com/media/8vQSQ3cNXuDGo/giphy.gif"
        alt=""
      />
      <img
        class="page-sticker"
        src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif"
        alt=""
      />
      <img
        class="page-sticker"
        src="https://media.giphy.com/media/nR4L10XlJcSeQ/giphy.gif"
        alt=""
      />
    </div>

    <main class="page-shell">
      <section class="invite-card" id="inviteCard" aria-live="polite">
        <div class="proposal" id="proposal">
          <div class="sticker-row">
            <img
              class="cat-sticker"
              src="https://media.giphy.com/media/vFKqnCdLPNOKc/giphy.gif"
              alt="Kucing kecil yang lucu"
            />
            <p class="mini-note">Ridho Ganteng 123</p>
            <img
              class="cat-sticker"
              src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif"
              alt="Kucing mengetik imut"
            />
          </div>

          <p class="eyebrow">Untuk Aisyah tersayang</p>
          <h1>Aisyah Cantik mau ga nanti malam jalan sama aku?</h1>
          <p class="love-line">
            Aku sudah siap jalan sama orang cantik sedunia
            &#128150;&#128151;
          </p>

          <div class="sticker-cloud" aria-label="Stiker kucing lucu">
            <img
              class="tiny-sticker"
              src="https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif"
              alt="Stiker kucing imut"
            />
            <img
              class="tiny-sticker"
              src="https://media.giphy.com/media/11s7Ke7jcNxCHS/giphy.gif"
              alt="Stiker kucing lucu"
            />
            <img
              class="tiny-sticker"
              src="https://media.giphy.com/media/nR4L10XlJcSeQ/giphy.gif"
              alt="Stiker kucing kecil"
            />
            <img
              class="tiny-sticker"
              src="https://media.giphy.com/media/vFKqnCdLPNOKc/giphy.gif"
              alt="Stiker kucing manis"
            />
            <img
              class="tiny-sticker"
              src="https://media.giphy.com/media/13CoXDiaCcCoyk/giphy.gif"
              alt="Stiker kucing gemas"
            />
            <img
              class="tiny-sticker"
              src="https://media.giphy.com/media/8vQSQ3cNXuDGo/giphy.gif"
              alt="Stiker kucing bahagia"
            />
            <img
              class="tiny-sticker"
              src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif"
              alt="Stiker kucing mengetik"
            />
            <img
              class="tiny-sticker"
              src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif"
              alt="Stiker kucing menggemaskan"
            />
          </div>

          <div class="cat-stage">
            <img
              class="main-gif"
              src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif"
              alt="Kucing menggemaskan"
            />
            <div class="chibi-cat" aria-hidden="true">
              <div class="ear ear-left"></div>
              <div class="ear ear-right"></div>
              <div class="face">
                <span class="eye eye-left"></span>
                <span class="eye eye-right"></span>
                <span class="nose"></span>
                <span class="mouth"></span>
                <span class="blush blush-left"></span>
                <span class="blush blush-right"></span>
              </div>
              <div class="paw paw-left"></div>
              <div class="paw paw-right"></div>
            </div>
          </div>

          <div class="actions" id="actions">
            <button class="btn yes-btn" id="yesBtn" type="button">
              Iya, mau
            </button>
            <button class="btn no-btn" id="noBtn" type="button">Tidak</button>
          </div>
        </div>

        <div class="accepted" id="accepted" hidden>
          <img
            class="accepted-gif"
            src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
            alt="Kucing senang"
          />
          <p class="eyebrow">Yeeey!</p>
          <h2>Makasih sayang</h2>
          <p class="love-line">
            Nanti malam kita jalan ya. Aku senang banget kamu bilang iya
            &#128150;&#128150;
          </p>
          <div class="sticker-cloud accepted-stickers" aria-label="Stiker kucing senang">
            <img
              class="tiny-sticker"
              src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif"
              alt="Stiker kucing senang"
            />
            <img
              class="tiny-sticker"
              src="https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif"
              alt="Stiker kucing manja"
            />
            <img
              class="tiny-sticker"
              src="https://media.giphy.com/media/11s7Ke7jcNxCHS/giphy.gif"
              alt="Stiker kucing lucu"
            />
            <img
              class="tiny-sticker"
              src="https://media.giphy.com/media/13CoXDiaCcCoyk/giphy.gif"
              alt="Stiker kucing imut"
            />
            <img
              class="tiny-sticker"
              src="https://media.giphy.com/media/8vQSQ3cNXuDGo/giphy.gif"
              alt="Stiker kucing bahagia"
            />
            <img
              class="tiny-sticker"
              src="https://media.giphy.com/media/nR4L10XlJcSeQ/giphy.gif"
              alt="Stiker kucing kecil"
            />
          </div>
          <button class="btn back-btn" id="backBtn" type="button">
            Kembali
          </button>
        </div>
      </section>
    </main>

    <div class="no-hint" id="noHint" role="status" aria-live="polite"></div>

    <script src="script.js"></script>
  </body>
</html>
